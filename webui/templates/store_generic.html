{% extends "base.html" %}
{% block title %}{{ title }} · me-cli{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-bold">{{ title }}</h1>
  <form method="get" class="flex items-center gap-2 text-sm">
    <label class="flex items-center gap-1"><input type="checkbox" name="enterprise" value="true" {% if enterprise %}checked{% endif %} onchange="this.form.submit()"> Enterprise</label>
  </form>
</div>
<div class="card">
  <pre class="text-xs overflow-x-auto bg-slate-950 p-2 rounded">{{ res | tojson(indent=2) }}</pre>
</div>
{% endblock %}
