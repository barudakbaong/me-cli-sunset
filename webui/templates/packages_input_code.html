{% extends "base.html" %}
{% block title %}Cari paket · me-cli{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card">
    <h1 class="text-xl font-bold mb-3">Cari Paket — {{ "Option Code" if mode == "option" else "Family Code" }}</h1>
    <form method="get" action="/packages/by-{{ 'option' if mode == 'option' else 'family' }}" class="space-y-3">
      <div>
        <label class="label">{{ "Option Code" if mode == "option" else "Family Code" }}</label>
        <input class="form-input font-mono" type="text" name="code" required>
      </div>
      <button class="btn btn-primary w-full" type="submit">Cari</button>
    </form>
  </div>
</div>
{% endblock %}
