{% extends "base.html" %}
{% block title %}Register · me-cli{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card">
    <h1 class="text-xl font-bold mb-3">📝 Register (Dukcapil)</h1>
    <form action="/register" method="post" class="space-y-3"
          data-confirm="Registrasi MSISDN <span class='font-mono text-sky-300'>{field:msisdn}</span> akan diproses dengan NIK & KK yang lo masukin. Pastikan data sesuai dengan KTP — kalau salah berkali-kali nomor bisa kena suspend."
          data-confirm-title="Konfirmasi Registrasi"
          data-confirm-variant="warning"
          data-confirm-ok="Daftarkan">
      <div><label class="label">MSISDN (628xxx)</label><input class="form-input" name="msisdn" pattern="628\d{7,11}" value="{{ msisdn or '' }}" required></div>
      <div><label class="label">NIK (16 digit)</label><input class="form-input" name="nik" pattern="\d{16}" required></div>
      <div><label class="label">KK (16 digit)</label><input class="form-input" name="kk" pattern="\d{16}" required></div>
      <button class="btn btn-primary w-full" type="submit">Submit</button>
    </form>
    <a href="/register/puk" class="block text-xs text-slate-400 hover:text-slate-200 mt-3">Validasi PUK →</a>
  </div>
  {% if res %}
  <div class="card mt-3">
    <pre class="text-xs overflow-x-auto bg-slate-950 p-2 rounded">{{ res | tojson(indent=2) }}</pre>
  </div>
  {% endif %}
</div>
{% endblock %}
